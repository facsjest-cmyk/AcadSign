name: acadsign-backend

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - ./.env.prod
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    env_file:
      - ./.env.prod
    ports:
      - "19001:9001"
    volumes:
      - minio-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  migrator:
    image: ${IMAGE_REPOSITORY}:${IMAGE_TAG}
    restart: "no"
    env_file:
      - ./.env.prod
    entrypoint: ["/app/efbundle"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  api:
    image: ${IMAGE_REPOSITORY}:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ./.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "18080:8080"
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5

networks:
  backend:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
