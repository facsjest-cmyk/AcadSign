name: .NET Tests

'on':
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore AcadSign.Backend/AcadSign.Backend.slnx

    - name: Build
      run: dotnet build AcadSign.Backend/AcadSign.Backend.slnx --no-restore --configuration Release

    - name: Run Unit Tests
      run: |
        dotnet test AcadSign.Backend/tests/Application.UnitTests/Application.UnitTests.csproj \
          --no-build \
          --configuration Release \
          --logger "trx;LogFileName=unit-test-results.trx" \
          --collect:"XPlat Code Coverage" \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

    - name: Run Domain Unit Tests
      run: |
        dotnet test AcadSign.Backend/tests/Domain.UnitTests/Domain.UnitTests.csproj \
          --no-build \
          --configuration Release \
          --logger "trx;LogFileName=domain-test-results.trx" \
          --collect:"XPlat Code Coverage"

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results
        path: |
          **/TestResults/*.trx
          **/TestResults/**/coverage.opencover.xml

    - name: Publish Code Coverage
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: '**/TestResults/**/coverage.opencover.xml'
        flags: unittests
        name: codecov-unit-tests

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acadsign_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Docker (for Testcontainers)
      run: |
        docker --version
        docker ps

    - name: Restore dependencies
      run: dotnet restore AcadSign.Backend/AcadSign.Backend.slnx

    - name: Build
      run: dotnet build AcadSign.Backend/AcadSign.Backend.slnx --no-restore --configuration Release

    - name: Run Integration Tests
      run: |
        dotnet test AcadSign.Backend/tests/Infrastructure.IntegrationTests/Infrastructure.IntegrationTests.csproj \
          --no-build \
          --configuration Release \
          --logger "trx;LogFileName=integration-test-results.trx" \
          --collect:"XPlat Code Coverage" \
          --filter "Category=P0|Category=Infrastructure" \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      env:
        TESTCONTAINERS_RYUK_DISABLED: false

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: |
          **/TestResults/*.trx
          **/TestResults/**/coverage.opencover.xml

    - name: Publish Code Coverage
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: '**/TestResults/**/coverage.opencover.xml'
        flags: integrationtests
        name: codecov-integration-tests

  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore AcadSign.Backend/AcadSign.Backend.slnx

    - name: Build
      run: dotnet build AcadSign.Backend/AcadSign.Backend.slnx --no-restore --configuration Release

    - name: Run Functional Tests
      run: |
        dotnet test AcadSign.Backend/tests/Application.FunctionalTests/Application.FunctionalTests.csproj \
          --no-build \
          --configuration Release \
          --logger "trx;LogFileName=functional-test-results.trx" \
          --collect:"XPlat Code Coverage"

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: functional-test-results
        path: |
          **/TestResults/*.trx
          **/TestResults/**/coverage.opencover.xml

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, functional-tests]
    if: always()

    steps:
    - name: Download All Test Results
      uses: actions/download-artifact@v4
      with:
        path: test-results

    - name: Publish Test Summary
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results Summary
        path: 'test-results/**/*.trx'
        reporter: dotnet-trx
        fail-on-error: true

    - name: Comment PR with Test Results
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request' && always()
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          let comment = '## 🧪 Test Results\n\n';
          comment += '| Test Suite | Status |\n';
          comment += '|------------|--------|\n';
          
          const jobs = ['unit-tests', 'integration-tests', 'functional-tests'];
          const statuses = {
            'unit-tests': '${{ needs.unit-tests.result }}',
            'integration-tests': '${{ needs.integration-tests.result }}',
            'functional-tests': '${{ needs.functional-tests.result }}'
          };
          
          for (const job of jobs) {
            const status = statuses[job];
            const emoji = status === 'success' ? '✅' : '❌';
            comment += `| ${job} | ${emoji} ${status} |\n`;
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
