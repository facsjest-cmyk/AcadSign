name: Deploy AcadSign Backend

on:
  push:
    branches:
      - main
    paths:
      - 'AcadSign.Backend/**'
      - 'deploy/backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: acadsign-backend-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEPLOY_PATH: /srv/acadsign-backend

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.vars.outputs.image_repository }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image coordinates
        id: vars
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image_repository=${REGISTRY}/${owner_lc}/acadsign-backend" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./AcadSign.Backend
          file: ./AcadSign.Backend/src/Web/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image_repository }}:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.image_repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      contents: read
      packages: read
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Ensure remote deploy directory exists
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          ssh "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" "mkdir -p '$DEPLOY_PATH'"

      - name: Upload Docker Compose file
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          scp deploy/backend/docker-compose.prod.yml "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST:$DEPLOY_PATH/docker-compose.prod.yml"

      - name: Authenticate remote host to GHCR
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          printf '%s' "$GHCR_READ_TOKEN" | ssh "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Deploy backend stack
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          IMAGE_REPOSITORY: ${{ needs.build.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          ssh "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" "IMAGE_REPOSITORY='$IMAGE_REPOSITORY' IMAGE_TAG='$IMAGE_TAG' DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          if [ ! -f .env.prod ]; then
            echo ".env.prod is missing in $DEPLOY_PATH" >&2
            exit 1
          fi

          cat > .deploy.env <<DEPLOYVARS
IMAGE_REPOSITORY=${IMAGE_REPOSITORY}
IMAGE_TAG=${IMAGE_TAG}
DEPLOYVARS
          chmod 600 .deploy.env

          docker compose --env-file .deploy.env -f docker-compose.prod.yml pull api
          docker compose --env-file .deploy.env -f docker-compose.prod.yml up -d postgres minio
          docker compose --env-file .deploy.env -f docker-compose.prod.yml run --rm migrator
          docker compose --env-file .deploy.env -f docker-compose.prod.yml up -d api

          api_container="$(docker compose --env-file .deploy.env -f docker-compose.prod.yml ps -q api)"
          for _ in $(seq 1 24); do
            status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$api_container")"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            sleep 5
          done

          docker compose --env-file .deploy.env -f docker-compose.prod.yml logs --tail 200 api
          exit 1
          EOF
