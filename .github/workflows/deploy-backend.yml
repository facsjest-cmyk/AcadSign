name: Deploy AcadSign Backend

on:
  push:
    branches:
      - main
    paths:
      - 'AcadSign.Backend/**'
      - 'deploy/backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: acadsign-backend-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEPLOY_PATH: /srv/acadsign-backend

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.vars.outputs.image_repository }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image coordinates
        id: vars
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image_repository=${REGISTRY}/${owner_lc}/acadsign-backend" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./AcadSign.Backend
          file: ./AcadSign.Backend/src/Web/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image_repository }}:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.image_repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: [self-hosted, linux, X64]
    needs: build
    environment: production
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure remote deploy directory exists
        run: |
          mkdir -p "${{ env.DEPLOY_PATH }}"

      - name: Copy Docker Compose file to deploy path
        run: |
          cp deploy/backend/docker-compose.prod.yml "${{ env.DEPLOY_PATH }}/docker-compose.prod.yml"

      - name: Authenticate to GHCR
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Deploy backend stack
        env:
          IMAGE_REPOSITORY: ${{ needs.build.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          cd "${{ env.DEPLOY_PATH }}"

          if [ ! -f .env.prod ]; then
            echo ".env.prod is missing in ${{ env.DEPLOY_PATH }}" >&2
            exit 1
          fi

          cat > .deploy.env <<DEPLOYVARS
          IMAGE_REPOSITORY=${IMAGE_REPOSITORY}
          IMAGE_TAG=${IMAGE_TAG}
          DEPLOYVARS
          chmod 600 .deploy.env

          docker compose --env-file .deploy.env -f docker-compose.prod.yml pull api
          docker compose --env-file .deploy.env -f docker-compose.prod.yml up -d postgres minio
          docker compose --env-file .deploy.env -f docker-compose.prod.yml run --rm migrator
          docker compose --env-file .deploy.env -f docker-compose.prod.yml up -d api

          api_container="$(docker compose --env-file .deploy.env -f docker-compose.prod.yml ps -q api)"
          for _ in $(seq 1 24); do
            status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$api_container")"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            sleep 5
          done

          docker compose --env-file .deploy.env -f docker-compose.prod.yml logs --tail 200 api
          exit 1
